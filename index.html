<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        // ※ここに先ほどの鍵を必ず貼り付けてください
    const firebaseConfig = {
  apiKey: "AIzaSyDL8fGnQYQg40ovPiZyrYxLJ-3e_iDKFdc",
  authDomain: "daigoutei-191b2.firebaseapp.com",
  projectId: "daigoutei-191b2",
  storageBucket: "daigoutei-191b2.firebasestorage.app",
  messagingSenderId: "724185590715",
  appId: "1:724185590715:web:b1f3d5fa14a46c9423f29e"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const blueprintDocRef = doc(db, "settings", "blueprintImage");

    // 画像アップロード処理
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (event) => {
            // Firestoreだけに保存する（Storageは使わない！）
            await setDoc(blueprintDocRef, { base64: event.target.result });
            alert("同期しました！");
        };
        reader.readAsDataURL(file);
    });

    // 画像読み込み処理
    onSnapshot(blueprintDocRef, (docSnap) => {
        if (docSnap.exists()) {
            const imgElement = document.getElementById('blueprint');
            imgElement.src = docSnap.data().base64;
            imgElement.style.display = 'block';
        }
    });
</script>
