<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>見取り図メモアプリ（リアルタイム共有版）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        h1 { font-size: 24px; }
        #controls { margin-bottom: 20px; }
        
        /* 見取り図エリア */
        #map-container {
            position: relative;
            display: inline-block;
            border: 2px dashed #ccc;
            background-color: #fff;
            max-width: 100%;
        }
        #blueprint {
            display: block;
            max-width: 100%;
            height: auto;
        }
        
        /* ピンのスタイル */
        .pin {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #ff3b30;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* ポップアップ（共通） */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
            width: 320px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal textarea {
            width: 100%;
            height: 80px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-cancel { background: #8e8e93; }
        
        #view-photo {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }
        .input-group { margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>🗺 見取り図ピン留めアプリ（リアルタイム共有版）</h1>
    
    <div id="controls">
        <label>① 見取り図を選択（各自の画面表示用）：</label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="map-container">
        <img id="blueprint" src="" alt="画像を選択してください" style="display:none;">
    </div>

    <div id="overlay"></div>

    <div id="memo-box" class="modal">
        <h3>📌 情報をクラウドに記録</h3>
        <div class="input-group">
            <label>テキストメモ：</label>
            <textarea id="memo-text" placeholder="ここにメモを入力..."></textarea>
        </div>
        <div class="input-group">
            <label>写真を追加：</label>
            <input type="file" id="pin-photo-input" accept="image/*">
        </div>
        <button class="btn" id="save-btn">保存</button>
        <button class="btn btn-cancel" id="cancel-btn">キャンセル</button>
    </div>

    <div id="view-box" class="modal">
        <h3>📌 クラウドの記録内容</h3>
        <p id="view-text" style="white-space: pre-wrap;"></p>
        <img id="view-photo" src="" alt="添付写真">
        <br><br>
        <button class="btn btn-cancel" id="close-view-btn">閉じる</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️【コピペエリア】あなたのFirebase画面にある「const firebaseConfig = { ... };」を以下に丸ごと上書き貼り付けしてください。
        const firebaseConfig = {
  apiKey: "AIzaSyDL8fGnQYQg40ovPiZyrYxLJ-3e_iDKFdc",
  authDomain: "daigoutei-191b2.firebaseapp.com",
  projectId: "daigoutei-191b2",
  storageBucket: "daigoutei-191b2.firebasestorage.app",
  messagingSenderId: "724185590715",
  appId: "1:724185590715:web:b1f3d5fa14a46c9423f29e"
};

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const pinsCollection = collection(db, "pins"); // "pins"という名前の金庫を作る

        // 画面要素の取得
        const fileInput = document.getElementById('file-input');
        const blueprint = document.getElementById('blueprint');
        const container = document.getElementById('map-container');
        const memoBox = document.getElementById('memo-box');
        const viewBox = document.getElementById('view-box');
        const overlay = document.getElementById('overlay');
        const memoText = document.getElementById('memo-text');
        const pinPhotoInput = document.getElementById('pin-photo-input');
        const saveBtn = document.getElementById('save-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        
        const viewText = document.getElementById('view-text');
        const viewPhoto = document.getElementById('view-photo');
        const closeViewBtn = document.getElementById('close-view-btn');

        let currentCoords = { x: 0, y: 0 };
        let currentPinPhotoData = ""; 

        // 1. ローカルでの見取り図表示（見取り図画像は各自が端末で選ぶ形にしています）
        window.addEventListener('DOMContentLoaded', () => {
            const savedImage = localStorage.getItem('myBlueprintImgShared');
            if (savedImage) {
                blueprint.src = savedImage;
                blueprint.style.display = 'block';
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    blueprint.src = event.target.result;
                    blueprint.style.display = 'block';
                    localStorage.setItem('myBlueprintImgShared', event.target.result);
                }
                reader.readAsDataURL(file);
            }
        });

        // 2. 写真のBase64変換
        pinPhotoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentPinPhotoData = event.target.result;
                }
                reader.readAsDataURL(file);
            } else {
                currentPinPhotoData = "";
            }
        });

        // 3. クリックでポップアップを開く
        container.addEventListener('click', (e) => {
            if (e.target === blueprint || e.target === container) {
                const rect = container.getBoundingClientRect();
                currentCoords.x = ((e.clientX - rect.left) / rect.width) * 100;
                currentCoords.y = ((e.clientY - rect.top) / rect.height) * 100;

                memoText.value = '';
                pinPhotoInput.value = '';
                currentPinPhotoData = "";
                memoBox.style.display = 'block';
                overlay.style.display = 'block';
            }
        });

        // 4. 【重要】クラウド（Firebase）へデータを保存する
        saveBtn.addEventListener('click', async () => {
            const text = memoText.value;
            
            try {
                // Firebaseの「pins」金庫にデータを追加！
                await addDoc(pinsCollection, {
                    x: currentCoords.x,
                    y: currentCoords.y,
                    note: text,
                    photo: currentPinPhotoData,
                    createdAt: new Date().getTime() // 念のため作成日時も記録
                });
                closeModal();
            } catch (error) {
                console.error("データ保存エラー: ", error);
                alert("データの保存に失敗しました。Firebaseの設定を確認してください。");
            }
        });

        // 5. 【重要】クラウドのデータをリアルタイムに監視して画面にピンを描画する
        // これがあるおかげで、別の人がピンを打っても自動で画面が更新されます！
        onSnapshot(pinsCollection, (snapshot) => {
            // 一度古いピンを消す
            document.querySelectorAll('.pin').forEach(pin => pin.remove());

            // クラウドにある最新のデータ一覧をループ処理
            snapshot.forEach((doc) => {
                const pinData = doc.data();
                
                const pin = document.createElement('div');
                pin.className = 'pin';
                pin.style.left = pinData.x + '%';
                pin.style.top = pinData.y + '%';

                pin.addEventListener('click', (e) => {
                    e.stopPropagation();
                    viewText.textContent = pinData.note || "（メモはありません）";
                    if (pinData.photo) {
                        viewPhoto.src = pinData.photo;
                        viewPhoto.style.display = 'block';
                    } else {
                        viewPhoto.style.display = 'none';
                    }
                    viewBox.style.display = 'block';
                    overlay.style.display = 'block';
                });

                container.appendChild(pin);
            });
        });

        cancelBtn.addEventListener('click', closeModal);
        closeViewBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', closeModal);
        
        function closeModal() {
            memoBox.style.display = 'none';
            viewBox.style.display = 'none';
            overlay.style.display = 'none';
        }
    </script>
</body>
</html>
